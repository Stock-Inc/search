name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/search
      SPRING_DATASOURCE_USERNAME: search
      SPRING_DATASOURCE_PASSWORD: search
      SPRING_ELASTICSEARCH_URIS: http://localhost:9200
      SPRING_DATA_REDIS_HOST: localhost
      SPRING_DATA_REDIS_PORT: 6379
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: search
          POSTGRES_USER: search
          POSTGRES_PASSWORD: search
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U search -d search"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:9.4.2
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: -Xms512m -Xmx512m
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew test
      - run: docker build -t search-backend:${{ github.sha }} .

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bunx vite build
      - run: docker build -t search-frontend:${{ github.sha }} .
